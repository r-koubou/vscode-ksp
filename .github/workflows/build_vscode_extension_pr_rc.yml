name: vsce-pr (into main)

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-vsce-pr:
    uses: ./.github/workflows/build_vscode_extension.yml
    secrets: inherit
    with:
      channel: rc
      lsp-program-version: latest
      lsp-build-configuration: Release
      preview-flag: false
      pre-release-build: false
